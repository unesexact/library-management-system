<div class="container mt-5">

    <h1>
        Users Management
    </h1>

    <div class="card mt-4">

        <div class="card-body">

            <h3>Add User</h3>

            <input
                    id="username"
                    class="form-control mb-2"
                    placeholder="Username">

            <input
                    id="password"
                    type="password"
                    class="form-control mb-2"
                    placeholder="Password">

            <input
                    id="fullName"
                    class="form-control mb-2"
                    placeholder="Full Name">

            <select
                    id="role"
                    class="form-select mb-2">

                <option value="USER">USER</option>
                <option value="ADMIN">ADMIN</option>

            </select>

            <button
                    id="saveButton"
                    class="btn btn-primary"
                    onclick="addUser()">

                Add User

            </button>

        </div>

    </div>

    <table class="table table-striped mt-4">

        <thead>

        <tr>

            <th>ID</th>
            <th>Username</th>
            <th>Full Name</th>
            <th>Role</th>
            <th>Actions</th>

        </tr>

        </thead>

        <tbody id="userTableBody">

        </tbody>

    </table>
