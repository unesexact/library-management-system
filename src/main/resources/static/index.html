            <span class="navbar-toggler-icon"></span>

        </button>


        <div class="collapse navbar-collapse" id="navbarNav">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link active" href="index.html">
                        Home
                    </a>
                </li>


                <li class="nav-item">
                    <a class="nav-link" href="books.html">
                        Books
                    </a>

                <li class="nav-item admin-link">

                    <a class="nav-link" href="categories.html">

<div class="container mt-5">


    <h1 class="text-center">
        📚 Library Dashboard
    </h1>


    <h4 class="text-center mt-3" id="welcomeMessage"></h4>


    <!-- ADMIN DASHBOARD -->

    <div id="adminDashboard" style="display:none;">


        <div class="row mt-5">


            <div class="col-md-3">

                <div class="card shadow text-center">

                    <div class="card-body">

                        <h3>📚</h3>

                        <h5>Books</h5>

                        <h2 id="bookCount">0</h2>

                    </div>

                </div>

            </div>


            <div class="col-md-3">

                <div class="card shadow text-center">

                    <div class="card-body">

                        <h3>👥</h3>

                        <h5>Users</h5>

                        <h2 id="userCount">0</h2>

                    </div>

                </div>

            </div>


            <div class="col-md-3">

                <div class="card shadow text-center">

                    <div class="card-body">

                        <h3>📂</h3>

                        <h5>Categories</h5>

                        <h2 id="categoryCount">0</h2>

                    </div>

                </div>

            </div>


            <div class="col-md-3">

                <div class="card shadow text-center">

                    <div class="card-body">

                        <h3>📖</h3>

                        <h5>Active Borrows</h5>

                        <h2 id="borrowCount">0</h2>

                    </div>

                </div>

            </div>


        </div>


    </div>


    <!-- USER DASHBOARD -->

    <div id="userDashboard" style="display:none;">


        <div class="row mt-5">


            <div class="col-md-6">

                <div class="card shadow text-center">

                    <div class="card-body">

                        <h3>📚</h3>

                        <h5>Available Books</h5>

                        <h2 id="availableBooks">0</h2>


                    </div>

                </div>

            </div>


            <div class="col-md-6">

                <div class="card shadow text-center">


                    <div class="card-body">

                        <h3>📖</h3>

                        <h5>My Borrows</h5>

                        <h2 id="myBorrowCount">0</h2>


                    </div>

                </div>


            </div>


        </div>


    </div>


</div>

<script src="js/dashboard.js"></script>
<script src="js/auth.js"></script>
