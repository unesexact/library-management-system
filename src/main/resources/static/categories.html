<div class="container mt-5">

    <h1>
        Categories Management
    </h1>

    <div class="card mt-4">

        <div class="card-body">

            <h3>Add Category</h3>


            <input
                    id="categoryName"
                    class="form-control mb-2"
                    placeholder="Category name">


            <input
                    id="categoryDescription"
                    class="form-control mb-2"
                    placeholder="Description">


            <button
                    id="saveButton"
                    class="btn btn-primary"
                    onclick="addCategory()">

            </button>

    <table class="table table-striped mt-4">

        <thead>

            <th>ID</th>
            <th>Name</th>
            <th>Description</th>
